<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <title> 
                Sign Up Page
            </title>
        <link rel="stylesheet" href="../../css/style.css">
</head>
<nav style>
    <a href="../register.html">Register</a>
    <a href="../survey.html">Survey</a>
    <a href="../index.html">Home</a>
<body class="signup-page">

    <main class="signup-wrapper d-flex justify-content-center align-items-center w-100 p-3">
        
        <div class="signup-container shadow p-4 p-md-5">
            <header class="text-center">
                <h2>Create an Account</h2>
                <p class="text-muted">Join our community and get exclusive access to new clothing drops.</p>
            </header>

            <form action="/signup-endpoint" method="POST" id="signupForm">
                
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" name="name" 
                           placeholder="Juan Dela Cruz" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="newEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="newEmail" name="email" 
                           placeholder="name@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="newPassword" name="password" 
                           minlength="8" placeholder="At least 8 characters" required>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirm_password" 
                           placeholder="Repeat your password" required>
                    <div id="passwordError" class="text-danger mt-2 small" style="display:none;">
                        * Passwords do not match. Please try again.
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                    <label class="form-check-label small text-secondary" for="terms">
                        I agree to the <a href="/terms" class="text-primary text-decoration-none">Terms and Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="submitBtn">
                    Sign Up
                </button>

            </form>

            <div class="form-footer text-center mt-3">
                <p class="small text-muted">
                    Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log in here</a>.
                </p>
            </div>
        </div>

    </main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Own Js script-->
<script src="../../js/main.js"></script>
</body>
</html>
