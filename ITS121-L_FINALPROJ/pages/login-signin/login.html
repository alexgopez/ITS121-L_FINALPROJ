<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <title> 
                Log In or Sign Up
            </title>
        <link rel="stylesheet" href="../../css/style.css">
    </head>
<body class="login-body">
    <main class="login-container">
        <header>
            <h1>Welcome!</h1>
            <p>Please log in to your account. <br>
               New here? <a href="signup.html">Create an account</a>.
            </p>
        </header>

        <form id="loginForm" action="index.html" method="POST">
            
            <div class="input-group">
                <label for="userEmail">Email Address</label>
                <input type="email" id="userEmail" name="email" placeholder="e.g., name@example.com" required autofocus>
            </div>

            <div class="input-group">
                <div class="label-wrapper">
                    <label for="userPassword">Password </label>
                </div>

                <div class="forgot-link-wrapper">
                    <a href="forgot.html" class="forgot-link">  Forgot password?</a>
                </div>
                    <input type="password" id="userPassword" name="password" placeholder="Enter your password" required>
                </div>

            <button type="submit" class="btn-primary">Log In</button>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="google-login">
                <button type="button" class="btn-google">Google</button>
            </div>
        </form>
    </main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Own Js script-->
<script src="../../js/main.js"></script>
</body>
</html>
